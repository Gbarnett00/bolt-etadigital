<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Preview - ETA Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: {
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-30px) translateX(30px); }
        }

        .particle:nth-child(1) { width: 80px; height: 80px; top: 20%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 60px; height: 60px; top: 60%; left: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 100px; height: 100px; top: 40%; left: 70%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 70px; height: 70px; top: 70%; left: 20%; animation-delay: 6s; }
        .particle:nth-child(5) { width: 90px; height: 90px; top: 10%; left: 60%; animation-delay: 8s; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-blue-50">
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="relative z-10 flex items-center justify-center h-full px-16">
        <div class="text-center max-w-4xl">
            <h1 class="text-7xl font-bold text-gray-900 mb-6 leading-tight">
                Automate Your Operations
            </h1>

            <p class="text-2xl text-gray-600 mb-10 leading-relaxed">
                Helping SME's to increase their profit through done for you AI automations.
            </p>

            <div class="inline-flex items-center gap-3 px-8 py-4 text-xl font-bold text-white bg-gradient-to-r from-accent-500 via-accent-600 to-accent-700 rounded-xl shadow-2xl shadow-accent-500/50">
                <span>Book a Call</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </div>

            <div class="mt-8 text-sm text-gray-500 font-semibold">
                etadigital.co.uk
            </div>
        </div>
    </div>
</body>
</html>
